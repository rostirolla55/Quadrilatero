<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mappa - Quadrilatero</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* CSS critico per evitare il bianco */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #app-wrapper { display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; width: 100%; min-height: 500px; background: #e5e3df; }
        
        #loading-message {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #ffeb3b; color: #000; text-align: center;
            padding: 10px; z-index: 10001; font-family: sans-serif;
        }

        /* Stile Cluster */
        .cluster-pin {
            background-color: #27ae60; color: white; border-radius: 50%;
            width: 35px; height: 35px; display: flex;
            align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading-message">Inizializzazione mappa...</div>

    <div id="app-wrapper">
        <header class="main-header" style="padding: 10px; background: #fff; border-bottom: 1px solid #ddd;">
            <div onclick="window.location.href='index.html'" style="cursor: pointer; color: green; font-weight: bold;">
                ✖ CHIUDI MAPPA
            </div>
        </header>
        <main id="map"></main>
    </div>

    <div id="nearbyMenuPlaceholder-map"></div>
    <button id="close-cluster-btn-map" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10000; padding:10px 20px; background:black; color:white; border-radius:20px;">CHIUDI ELENCO</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const currentLang = 'it';
        const suffix = currentLang === 'it' ? '-it' : `-${currentLang}`;

        function getSimboloCategoria(categoria) {
            if (!categoria) return '📍 ';
            const cat = categoria.toLowerCase();
            if (cat.includes('edificio') || cat.includes('stabile') || cat.includes('monumento')) return '🏛️ ';
            if (cat.includes('esterno') || cat.includes('aperto') || cat.includes('piazza')) return '🌳 ';
            if (cat.includes('arte') || cat.includes('quadro') || cat.includes('statua')) return '🎨 ';
            return '📍 ';
        }

        const redPinIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41],
            shadowAnchor: [12, 41]
        });

        async function caricaMappa() {
            const loader = document.getElementById('loading-message');
            try {
                // Inizializzazione Mappa
                const map = L.map('map').setView([44.4949, 11.3426], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // Caricamento POI
                const poisResponse = await fetch('pois_config.json');
                if (!poisResponse.ok) throw new Error("File pois_config.json non trovato");
                const poisData = await poisResponse.json();

                // Tentativo caricamento traduzioni (se fallisce usiamo fallback)
                let navTitles = {};
                try {
                    const textsResponse = await fetch(`data/translations/${currentLang}/texts.json`);
                    if (textsResponse.ok) {
                        const textsData = await textsResponse.json();
                        navTitles = textsData.nav || {};
                    }
                } catch (e) { console.warn("Traduzioni non caricate, uso ID di backup."); }

                // Raggruppamento per coordinate
                const clusters = {};
                poisData.pois.forEach(p => {
                    const k = `${p.lat}_${p.lon}`;
                    if (!clusters[k]) clusters[k] = [];
                    clusters[k].push(p);
                });

                // Posizionamento Marker
                Object.values(clusters).forEach(group => {
                    const first = group[0];
                    const pos = [first.lat, first.lon];

                    if (group.length === 1) {
                        const marker = L.marker(pos, { icon: redPinIcon }).addTo(map);
                        const label = navTitles[first.nav_id] || first.id;
                        marker.bindTooltip(label, { direction: 'top', offset: [0, -35] });
                        marker.on('click', () => {
                            window.location.href = `${first.base_name}${suffix}.html`;
                        });
                    } else {
                        const clusterIcon = L.divIcon({
                            html: `<div class="cluster-pin">${group.length}</div>`,
                            className: 'custom-cluster',
                            iconSize: [35, 35],
                            iconAnchor: [17, 17]
                        });
                        const cMarker = L.marker(pos, { icon: clusterIcon }).addTo(map);
                        
                        cMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            menu.innerHTML = '';
                            group.forEach(poi => {
                                const btn = document.createElement('button');
                                btn.className = 'cluster-menu-item-map';
                                const icona = getSimboloCategoria(poi.categoria);
                                const tito = navTitles[poi.nav_id] || poi.id;
                                btn.innerHTML = `<span>${icona} ${tito}</span>`;
                                btn.onclick = () => window.location.href = `${poi.base_name}${suffix}.html`;
                                menu.appendChild(btn);
                            });
                            menu.classList.add('active');
                            document.getElementById('close-cluster-btn-map').style.display = 'block';
                        });
                    }
                });

                loader.style.display = 'none';

            } catch (err) {
                console.error(err);
                loader.style.background = "red";
                loader.innerHTML = "ERRORE CRITICO: " + err.message;
            }
        }

        document.getElementById('close-cluster-btn-map').onclick = function() {
            document.getElementById('nearbyMenuPlaceholder-map').classList.remove('active');
            this.style.display = 'none';
        };

        window.onload = caricaMappa;
    </script>
</body>
</html>
