<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mappa - Quadrilatero</title>
    
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Forza la visibilità della mappa */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #app-wrapper { display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 1; width: 100%; background: #e5e3df; }
        
        #loading-message {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #ffeb3b; padding: 10px; text-align: center;
            z-index: 10001; font-weight: bold;
        }

        .cluster-pin {
            background-color: #28a745; color: white; border-radius: 50%;
            width: 35px; height: 35px; display: flex;
            align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading-message">Caricamento mappa e monumenti...</div>

    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group" style="cursor: pointer;" onclick="window.location.href='index.html'">
                <div class="map-link">
                    <span style="color: #d9534f; font-weight: bold; font-size: 1.1rem;">✖ CHIUDI MAPPA</span>
                </div>
            </div>
        </header>

        <main id="map"></main>
    </div>

    <div id="nearbyMenuPlaceholder-map"></div>
    <button id="close-cluster-btn-map">CHIUDI ELENCO</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CONFIGURAZIONE ---
        const currentLang = 'it';
        const suffix = currentLang === 'it' ? '' : `-${currentLang}`;

        // Funzione Simboli Categoria (Portata qui per evitare dipendenze da main.js)
        function getSimbolo(categoria) {
            if (!categoria) return '📍 ';
            const cat = categoria.toLowerCase();
            if (cat.includes('edificio') || cat.includes('stabile') || cat.includes('monumento')) return '🏛️ ';
            if (cat.includes('esterno') || cat.includes('aperto') || cat.includes('piazza')) return '🌳 ';
            if (cat.includes('arte') || cat.includes('quadro') || cat.includes('statua')) return '🎨 ';
            return '📍 ';
        }

        // --- ICONA ROSSA (FIX OFFSET NORD) ---
        const redPinIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41], // La punta è esattamente al centro base
            popupAnchor: [1, -34],
            shadowSize: [41, 41],
            shadowAnchor: [12, 41]
        });

        async function initMap() {
            try {
                // 1. Inizializza Mappa
                const map = L.map('map').setView([44.4949, 11.3426], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                // 2. Caricamento Dati (JSON)
                const [poisRes, textsRes] = await Promise.all([
                    fetch('pois_config.json'),
                    fetch(`data/translations/${currentLang}/texts.json`)
                ]).catch(err => { throw new Error("Errore nel caricamento dei file JSON"); });

                const poisData = await poisRes.json();
                const textsData = await textsRes.json();
                const navTitles = textsData.nav || {};

                // 3. Raggruppamento Cluster (Coordinate identiche)
                const clusters = {};
                poisData.pois.forEach(p => {
                    const key = `${p.lat}_${p.lon}`;
                    if (!clusters[key]) clusters[key] = [];
                    clusters[key].push(p);
                });

                // 4. Creazione Marker
                Object.values(clusters).forEach(group => {
                    const first = group[0];
                    const pos = [first.lat, first.lon];

                    if (group.length === 1) {
                        // PIN SINGOLO
                        const marker = L.marker(pos, { icon: redPinIcon }).addTo(map);
                        const titolo = navTitles[first.nav_id] || first.id;
                        
                        marker.bindTooltip(titolo, { direction: 'top', offset: [0, -35] });
                        marker.on('click', () => {
                            window.location.href = `${first.id}${suffix}.html`;
                        });
                        
                        // DEBUG: Cerchietto blu per verificare l'ancora
                        L.circleMarker(pos, {radius: 2, color: 'blue'}).addTo(map);

                    } else {
                        // CLUSTER (PIÙ MONUMENTI)
                        const clusterIcon = L.divIcon({
                            html: `<div class="cluster-pin">${group.length}</div>`,
                            className: 'custom-cluster',
                            iconSize: [35, 35],
                            iconAnchor: [17, 17]
                        });

                        const cMarker = L.marker(pos, { icon: clusterIcon }).addTo(map);
                        
                        cMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            const closeBtn = document.getElementById('close-cluster-btn-map');
                            
                            menu.innerHTML = '';
                            group.forEach(poi => {
                                const btn = document.createElement('button');
                                btn.className = 'cluster-menu-item-map';
                                const icona = getSimbolo(poi.categoria);
                                const titolo = navTitles[poi.nav_id] || poi.id;
                                btn.innerHTML = `<span>${icona} ${titolo}</span>`;
                                btn.onclick = () => {
                                    window.location.href = `${poi.id}${suffix}.html`;
                                };
                                menu.appendChild(btn);
                            });
                            
                            menu.style.display = 'block';
                            menu.classList.add('active');
                            closeBtn.style.display = 'block';
                        });
                    }
                });

                document.getElementById('loading-message').style.display = 'none';

            } catch (error) {
                console.error(error);
                const msg = document.getElementById('loading-message');
                msg.style.background = "red";
                msg.innerHTML = "ERRORE: " + error.message;
            }
        }

        // Chiusura menu cluster
        document.getElementById('close-cluster-btn-map').onclick = function() {
            const menu = document.getElementById('nearbyMenuPlaceholder-map');
            menu.classList.remove('active');
            menu.style.display = 'none';
            this.style.display = 'none';
        };

        window.onload = initMap;
    </script>
</body>
</html>
