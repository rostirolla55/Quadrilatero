<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mappa - Quadrilatero</title>
    
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* FIX VISIBILITÀ HEADER E MAPPA */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: white; }
        
        #app-wrapper { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            position: relative;
        }

        .main-header {
            background-color: white !important;
            border-bottom: 2px solid #ddd;
            z-index: 2000 !important; /* Più alto della mappa */
            display: flex;
            align-items: center;
            height: 60px;
            padding: 0 15px;
        }

        #map { 
            flex-grow: 1; 
            width: 100%; 
            z-index: 1; 
        }

        /* Testo Chiudi Mappa forzato visibile */
        .map-link span {
            color: #28a745 !important; 
            font-weight: bold !important;
            display: inline-block;
            margin-left: 10px;
        }

        #loading-message {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #ffeb3b; text-align: center; padding: 15px;
            z-index: 3000; font-weight: bold; font-family: sans-serif;
        }

        .cluster-pin {
            background-color: #28a745; color: white; border-radius: 50%;
            width: 35px; height: 35px; display: flex;
            align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading-message">Caricamento Mappa...</div>

    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group" style="cursor: pointer; display: flex; align-items: center;" onclick="window.location.href='index.html'">
                <div style="display: flex; flex-direction: column; gap: 4px; margin-right: 10px;">
                    <div style="width: 20px; height: 3px; background: black;"></div>
                    <div style="width: 20px; height: 3px; background: black;"></div>
                    <div style="width: 20px; height: 3px; background: black;"></div>
                </div>
                <div class="map-link">
                    <span>Chiudi la mappa</span>
                </div>
            </div>
        </header>
        
        <main id="map"></main>
    </div>

    <div id="nearbyMenuPlaceholder-map"></div>
    <button id="close-cluster-btn-map">CHIUDI ELENCO</button>

    <script type="module" src="main.js"></script>

    <script type="module">
        const currentLang = 'it';
        const suffix = ''; 

        // Icona Rossa con FIX ANCORA (Punta al suolo per coordinate Google Maps)
        const redPinIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41], // LA PUNTA: Metà larghezza, altezza totale
            popupAnchor: [1, -34],
            shadowSize: [41, 41],
            shadowAnchor: [12, 41]
        });

        async function startMap() {
            // ATTESA DEI DATI DAL MAIN.JS
            let attempts = 0;
            while ((!window.navTitles || !window.getSimboloCategoria) && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }

            try {
                const map = L.map('map').setView([44.4949, 11.3426], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                const response = await fetch('pois_config.json');
                const data = await response.json();

                const clusters = {};
                data.pois.forEach(p => {
                    const k = `${p.lat}_${p.lon}`;
                    if (!clusters[k]) clusters[k] = [];
                    clusters[k].push(p);
                });

                Object.values(clusters).forEach(group => {
                    const poi = group[0];
                    const latLng = [poi.lat, poi.lon];

                    if (group.length === 1) {
                        const marker = L.marker(latLng, { icon: redPinIcon }).addTo(map);
                        const nome = (window.navTitles && window.navTitles[poi.nav_id]) ? window.navTitles[poi.nav_id] : poi.id;
                        
                        marker.bindTooltip(nome, { direction: 'top', offset: [0, -35] });
                        marker.on('click', () => window.location.href = `${poi.id}${suffix}.html`);
                        
                        // CERCHIETTO BLU DI TEST (Rimuovilo dopo aver verificato l'ancora)
                        L.circleMarker(latLng, {radius: 2, color: 'blue', fillOpacity: 1}).addTo(map);

                    } else {
                        const clusterIcon = L.divIcon({
                            html: `<div class="cluster-pin">${group.length}</div>`,
                            className: 'custom-cluster',
                            iconSize: [35, 35],
                            iconAnchor: [17, 17]
                        });
                        const cMarker = L.marker(latLng, { icon: clusterIcon }).addTo(map);
                        
                        cMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            if (!menu) return;
                            menu.innerHTML = '';
                            group.forEach(p => {
                                const btn = document.createElement('button');
                                btn.className = 'cluster-menu-item-map';
                                const label = (window.navTitles && window.navTitles[p.nav_id]) ? window.navTitles[p.nav_id] : p.id;
                                const icona = window.getSimboloCategoria ? window.getSimboloCategoria(p.categoria) : '📍';
                                btn.innerHTML = `<span>${icona} ${label}</span>`;
                                btn.onclick = () => window.location.href = `${p.id}${suffix}.html`;
                                menu.appendChild(btn);
                            });
                            menu.classList.add('active');
                            menu.style.display = 'block';
                            document.getElementById('close-cluster-btn-map').style.display = 'block';
                        });
                    }
                });

                document.getElementById('loading-message').style.display = 'none';
            } catch (err) {
                console.error("Errore:", err);
                document.getElementById('loading-message').innerHTML = "Errore caricamento dati.";
            }
        }

        document.getElementById('close-cluster-btn-map').onclick = () => {
            document.getElementById('nearbyMenuPlaceholder-map').classList.remove('active');
            document.getElementById('nearbyMenuPlaceholder-map').style.display = 'none';
            document.getElementById('close-cluster-btn-map').style.display = 'none';
        };

        startMap();
    </script>
</body>
</html>
