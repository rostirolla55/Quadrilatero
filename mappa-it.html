<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mappa - Quadrilatero</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* FIX: Forza l'altezza e la visibilità */
        #app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        /* HEADER: deve stare sopra la mappa */
        .main-header {
            z-index: 2000 !important;
            background: white !important;
            display: flex !important;
            align-items: center !important;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        #loading-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ffeb3b;
            text-align: center;
            padding: 10px;
            z-index: 3000;
        }

        /* Stile Hamburger manuale per sicurezza visiva */
        .manual-hamburger {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-right: 12px;
        }

        .manual-hamburger span {
            width: 22px;
            height: 3px;
            background: black;
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <div id="loading-message">Caricamento in corso...</div>

    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group" style="cursor: pointer; display: flex; align-items: center;"
                onclick="window.location.href='index.html'">
                <div class="manual-hamburger">
                    <span></span><span></span><span></span>
                </div>
                <div class="map-link">
                    <span style="color: #28a745; font-weight: bold;">Chiudi la mappa</span>
                </div>
            </div>
        </header>
        <main id="map"></main>
    </div>

    <div id="nearbyMenuPlaceholder-map"></div>
    <button id="close-cluster-btn-map">CHIUDI ELENCO</button>

    <script type="module" src="main.js"></script>

    <script type="module">
        const currentLang = 'it';
        const suffix = '';

        // Definiamo l'icona con la punta "inchiodata" alle coordinate [12, 41]
        const redPinIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41], // LA SOLUZIONE: metà larghezza, altezza totale
            popupAnchor: [1, -34],
            shadowSize: [41, 41],
            shadowAnchor: [12, 41]
        });

        async function init() {
            // Aspetta che main.js popoli window.navTitles (max 5 secondi)
            let check = 0;
            while (!window.navTitles && check < 50) {
                await new Promise(r => setTimeout(r, 100));
                check++;
            }

            try {

                const [poisRes, textsRes] = await Promise.all([
                    fetch('pois_config.json'),
                    fetch(`data/translations/${currentLang}/texts.json`)
                ]);
                // Trasformiamo le risposte in oggetti JS
                const poisData = await poisRes.json();
                const translations = await textsRes.json();

                // Popoliamo le variabili globali usate dal resto del codice
                window.POIS_LOCATIONS = poisData.locations; // Assicurati che la struttura coincida
                window.allData = translations;

                // Se usi navTitles per i menu, popolalo qui
                window.navTitles = translations.navTitles || {};

                console.log("Dati caricati correttamente: icone e titoli pronti.");

                // ORA puoi chiamare la funzione che disegna la mappa o i menu
                // renderMap();





                const map = L.map('map').setView([44.4949, 11.3426], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                const res = await fetch('pois_config.json');
                const data = await res.json();

                const clusters = {};
                data.pois.forEach(p => {
                    const k = `${p.lat}_${p.lon}`;
                    if (!clusters[k]) clusters[k] = [];
                    clusters[k].push(p);
                });

                Object.values(clusters).forEach(group => {
                    const first = group[0];
                    const latLng = [first.lat, first.lon];

                    if (group.length === 1) {
                        const marker = L.marker(latLng, { icon: redPinIcon }).addTo(map);
                        const label = (window.navTitles && window.navTitles[first.nav_id]) ? window.navTitles[first.nav_id] : first.id;

                        marker.bindTooltip(label, { direction: 'top', offset: [0, -35] });
                        marker.on('click', () => window.location.href = `${first.id}${suffix}.html`);

                        // TEST OFFSET: Se la punta copre il cerchio blu, è perfetto
                        L.circleMarker(latLng, { radius: 2, color: 'blue', fillOpacity: 1 }).addTo(map);

                    } else {
                        const clusterIcon = L.divIcon({
                            html: `<div class="cluster-pin">${group.length}</div>`,
                            className: 'custom-cluster',
                            iconSize: [35, 35],
                            iconAnchor: [17, 17]
                        });
                        const cMarker = L.marker(latLng, { icon: clusterIcon }).addTo(map);

                        cMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            menu.innerHTML = '';
                            group.forEach(poi => {
                                const btn = document.createElement('button');
                                btn.className = 'cluster-menu-item-map';
                                const t = (window.navTitles && window.navTitles[poi.nav_id]) ? window.navTitles[poi.nav_id] : poi.id;
                                const s = window.getSimboloCategoria ? window.getSimboloCategoria(poi.categoria) : '📍';
                                btn.innerHTML = `<span>${s} ${t}</span>`;
                                btn.onclick = () => window.location.href = `${poi.id}${suffix}.html`;
                                menu.appendChild(btn);
                            });
                            menu.style.display = 'block';
                            menu.classList.add('active');
                            document.getElementById('close-cluster-btn-map').style.display = 'block';
                        });
                    }
                });

                document.getElementById('loading-message').style.display = 'none';
            } catch (e) {
                console.error("Errore inizializzazione:", e);
                document.getElementById('loading-message').innerHTML = "Errore caricamento dati.";
            }
        }

        document.getElementById('close-cluster-btn-map').onclick = () => {
            const menu = document.getElementById('nearbyMenuPlaceholder-map');
            menu.classList.remove('active');
            menu.style.display = 'none';
            document.getElementById('close-cluster-btn-map').style.display = 'none';
        };

        init();
    </script>
</body>

</html>
