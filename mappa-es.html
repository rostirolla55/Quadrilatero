<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title id="pageTitle">Mapa - Quadrilatero</title>
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <div id="loading-message">
        <p>cargando mapa...</p>
    </div>
    <button id="close-cluster-btn">LISTA DE CIERRE</button>
    <div id="nearbyMenuPlaceholder-map"></div>
    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group">
                <button aria-label="Apri menu" class="menu-toggle">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </button>
                <a href="mappa-it.html" id="mapNavLink" class="map-link">
                    <svg viewBox="0 0 24 24" class="pin-icon">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                    </svg>
                </a>
            </div>
            <div class="right-header-group">
                <div class="language-selector">
                    <button data-lang="it"><img alt="Italiano" src="public/flag/it.png" /></button>
                    <button data-lang="en"><img alt="English" src="public/flag/en.png" /></button>
                    <button data-lang="es"><img alt="Español" src="public/flag/es.png" /></button>
                    <button data-lang="fr"><img alt="Français" src="public/flag/fr.png" /></button>
                </div>
            </div>
        </header>

        <nav class="nav-bar-main" id="navBarMain">
            <div class="nav-bar-content">
                <ul>
                    <li><a href="index-it.html" id="navHome">Home</a></li>
                    </ul>
            </div>
        </nav>
        <div class="nav-bar-nearby" id="nearbyMenuPlaceholder"></div>

        <main class="content-body">
            <div class="header-image-container">
                <img id="headImage" src="public/images/panorama_bologna.jpg" alt="Mappa" />
                <h1 class="header-title" id="headerTitle">Mapa de lugares</h1>
            </div>

            <div class="main-content-area">
                <p id="mainMapsDesc" style="margin-bottom: 20px; font-style: italic;"></p>

                <div class="map-container" style="position: relative; padding-bottom: 75%; height: 0; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
                    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
                    <div id="map" style="height: 500px; width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);"></div>
                </div>
            </div>
        </main>

        <footer class="info-footer">
            <p>&copy; 2024 Quadrilatero. Todos los derechos reservados.</p>
        </footer>


        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                // --- RECUPERO LINGUA (FIX PER VARIABILE MANCANTE) ---
                const urlLang = window.location.pathname.match(/-([a-z]{2})\.html/);
                const currentLang = (urlLang && urlLang[1]) || localStorage.getItem('Quadrilatero_lastLang') || 'it';
			// --- INIZIO LOGICA MAPPA ---
            window.addEventListener('load', async () => {
                try {
                    // 1. Inizializzazione Mappa
                    const map = L.map('map').setView([44.4944, 11.3464], 16);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(map);

                    // 2. Definizione Icone
                    const redPinIcon = L.icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34],
                        shadowSize: [41, 41]
                    });

                    // 3. Funzione Clustering
                    function clusterPOI(pois, radius) {
                        const clusters = [];
                        const visited = new Set();
                        pois.forEach((p1, i) => {
                            if (visited.has(i)) return;
                            const group = [p1];
                            visited.add(i);
                            pois.forEach((p2, j) => {
                                if (visited.has(j)) return;
                                const dist = Math.sqrt(Math.pow(p1.lat - p2.lat, 2) + Math.pow(p1.lon - p2.lon, 2));
                                if (dist < radius) {
                                    group.push(p2);
                                    visited.add(j);
                                }
                            });
                            clusters.push(group);
                        });
                        return clusters;
                    }

                    // 4. Caricamento dati
                    const [poisRes, textsRes] = await Promise.all([
                        fetch('pois_config.json'),
                        fetch(`data/translations/${currentLang}/texts.json`)
                    ]);

                    const poisData = await poisRes.json();
                    const textsData = await textsRes.json();
                    
                    const allPois = poisData.pois;
                    const navTitles = textsData.nav || {};

                    // 5. Generazione Cluster e Pin
                    const clusters = clusterPOI(allPois, 0.0003);

                    clusters.forEach(group => {
                        if (group.length === 1) {
                            const poi = group[0];
                            L.marker([poi.lat, poi.lon], { icon: redPinIcon })
                                .addTo(map)
                                .bindTooltip(navTitles[poi.nav_id] || poi.id, {
                                    permanent: false,
                                    direction: 'top',
                                    className: 'map-tooltip'
                                })
                                .on('click', () => {
                                    const suffix = currentLang === 'it' ? '-it' : `-${currentLang}`;
                                    window.location.href = `${poi.base_name}${suffix}.html`;
                                });
                        } else {
                            const avgLat = group.reduce((sum, p) => sum + p.lat, 0) / group.length;
                            const avgLon = group.reduce((sum, p) => sum + p.lon, 0) / group.length;

                            const clusterIcon = L.divIcon({
                                html: `<div class="cluster-pin"><span>${group.length}</span></div>`,
                                className: '',
                                iconSize: [40, 40],
                                iconAnchor: [20, 20]
                            });

                            const clusterMarker = L.marker([avgLat, avgLon], { icon: clusterIcon }).addTo(map);

                            clusterMarker.on('click', (e) => {
                                L.DomEvent.stopPropagation(e);
                                const menu = document.getElementById('nearbyMenuPlaceholder-map');
                                const closeBtn = document.getElementById('close-cluster-btn-map');

                                if (menu) {
                                    menu.innerHTML = '';
                                    group.forEach(poi => {
                                        const btn = document.createElement('button');
                                        btn.className = 'cluster-menu-item-map';
                                        btn.textContent = navTitles[poi.nav_id] || poi.id;
                                        btn.onclick = () => {
                                            const suffix = currentLang === 'it' ? '-it' : `-${currentLang}`;
                                            window.location.href = `${poi.base_name}${suffix}.html`;
                                        };
                                        menu.appendChild(btn);
                                    });
                                    menu.classList.add('active');
                                    if (closeBtn) closeBtn.style.display = 'block';
                                }
                            });
                        }
                    });

                    // 6. Gestione chiusura menu
                    const closeBtnMap = document.getElementById('close-cluster-btn-map');
                    if (closeBtnMap) {
                        closeBtnMap.onclick = function() {
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            if (menu) menu.classList.remove('active');
                            this.style.display = 'none';
                        };
                    }

                    // Rimuovi messaggio caricamento
                    const loader = document.getElementById('loading-message');
                    if (loader) loader.style.display = 'none';

                } catch (error) {
                    console.error("Errore nel caricamento dei dati mappa:", error);
                }
            });
        </script>

        <script type="module" src="main.js"></script>
</body>

</html>
