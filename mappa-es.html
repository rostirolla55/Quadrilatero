<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Mappa - Quadrilatero</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* FIX: Forza l'altezza e la visibilità */
        /* FIX: Permetti lo scorrimento della pagina */
#app-wrapper {
            display: block; /* Ripristina lo scorrimento verticale */
            opacity: 1;     /* Assicurati che sia visibile */
            overflow: visible;
        }

        #map {
            width: 100%;
            height: 500px; /* Come nella versione precedente */
            z-index: 1;
        }

        @media (min-width: 992px) {
            #map {
                height: 600px;
                border-radius: 8px;
                border: 2px solid #ccc;
                margin-top: 10px;
            }
        }



        /* HEADER: deve stare sopra la mappa */
        .main-header {
            z-index: 2000 !important;
            background: white !important;
            display: flex !important;
            align-items: center !important;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        #loading-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #ffeb3b;
            text-align: center;
            padding: 10px;
            z-index: 3000;
        }

        /* Stile Hamburger manuale per sicurezza visiva */
        .manual-hamburger {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-right: 12px;
        }

        .manual-hamburger span {
            width: 22px;
            height: 3px;
            background: black;
            border-radius: 2px;
        }

		/* Impedisce a regole CSS esterne di spostare i marker della mappa */
		.leaflet-marker-icon, 
		.leaflet-marker-shadow {
			margin: 0 !important;
			padding: 0 !important;
			max-width: none !important;
			max-height: none !important;
		}
    </style>
</head>

<body>

    <div id="loading-message">Caricamento in corso...</div>

    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group" style="cursor: pointer; display: flex; align-items: center;"
                onclick="window.location.href='index.html'">
                <div class="manual-hamburger">
                    <span></span><span></span><span></span>
                </div>
                <div class="map-link">
                    <span style="color: #28a745; font-weight: bold;">Chiudi la mappa</span>
                </div>
            </div>
        </header>
        <main id="map"></main>
    </div>

    <div id="nearbyMenuPlaceholder-map"></div>
    <button id="close-cluster-btn-map">CHIUDI ELENCO</button>

    <script type="module" src="main.js"></script>

    <script type="module">
        const currentLang = 'it';
        const suffix = '';

        // Definiamo l'icona con la punta "inchiodata" alle coordinate [12, 41]
        const redPinIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [11,46], // LA SOLUZIONE: metà larghezza, altezza totale
            popupAnchor: [1, -34],
            shadowSize: [41, 41],
            shadowAnchor: [12, 41]
        });

        async function init() {
            try {
                // Carichiamo i dati necessari per la mappa
                const [poisRes, textsRes] = await Promise.all([
                    fetch('pois_config.json'),
                    fetch(`data/translations/${currentLang}/texts.json`)
                ]);

                const poisConfig = await poisRes.json();
                const translations = await textsRes.json();

                // Popoliamo le variabili globali in modo che siano disponibili ovunque
                window.allData = translations;
                window.navTitles = translations.nav || {}; // Nota: in main.js i titoli sono sotto 'nav'

                const map = L.map('map').setView([44.4949, 11.3426], 16);
                setTimeout(function () {
                    map.invalidateSize();
                }, 400);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                // Raggruppiamo i POI per posizione (clustering)
                const clusters = {};
                // Usiamo i POI dal file config appena caricato
                poisConfig.pois.forEach(p => {
                    const k = `${p.lat}_${p.lon}`;
                    if (!clusters[k]) clusters[k] = [];
                    clusters[k].push(p);
                });

                Object.values(clusters).forEach(group => {
                    const first = group[0];
                    const latLng = [first.lat, first.lon];

                    if (group.length === 1) {
                        const marker = L.marker(latLng, { icon: redPinIcon }).addTo(map);

                        // Recupero Titolo: Cerca prima nel nav tradotto, poi nel pageTitle, infine ID
                        const label = (window.navTitles && window.navTitles[first.nav_id])
                            ? window.navTitles[first.nav_id]
                            : (translations[first.id] && translations[first.id].pageTitle)
                                ? translations[first.id].pageTitle
                                : first.id;

                        marker.bindTooltip(label, { direction: 'top', offset: [0, -35] });
                        marker.on('click', () => window.location.href = `${first.id}${suffix}.html`);

                        // L.circleMarker(latLng, { radius: 2, color: 'blue', fillOpacity: 1 }).addTo(map);

                    } else {
                        // Logica Cluster...
                        const clusterIcon = L.divIcon({
                            html: `<div class="cluster-pin">${group.length}</div>`,
                            className: 'custom-cluster',
                            iconSize: [35, 35],
                            iconAnchor: [17, 17]
                        });
                        const cMarker = L.marker(latLng, { icon: clusterIcon }).addTo(map);

                        cMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            menu.innerHTML = '';
                            group.forEach(poi => {
                                const btn = document.createElement('button');
                                btn.className = 'cluster-menu-item-map';

                                // Titolo e Icona per il menu del cluster
                                const t = (window.navTitles && window.navTitles[poi.nav_id])
                                    ? window.navTitles[poi.nav_id]
                                    : (translations[poi.id] && translations[poi.id].pageTitle)
                                        ? translations[poi.id].pageTitle
                                        : poi.id;

                                // Verifica se la categoria esiste, altrimenti assegna 'default' o un'icona info
                                const categoriaValida = poi.categoria && poi.categoria !== "" ? poi.categoria : 'info';

                                const s = window.getSimboloCategoria
                                    ? window.getSimboloCategoria(categoriaValida)
                                    : '📍';
                                btn.innerHTML = `<span>${s} ${t}</span>`;
                                btn.onclick = () => window.location.href = `${poi.id}${suffix}.html`;
                                menu.appendChild(btn);
                            });
                            menu.style.display = 'block';
                            menu.classList.add('active');
                            document.getElementById('close-cluster-btn-map').style.display = 'block';
                        });
                    }
                });

 // Nascondiamo il caricamento
                document.getElementById('loading-message').style.display = 'none';

                // FIX DEFINITIVO PIN:
                // Eseguiamo il ricalcolo solo quando tutto è visibile
                setTimeout(function () {
                    if (typeof map !== 'undefined') {
                        map.invalidateSize();
                        // Un piccolo trucco: muoviamo la mappa di 1 pixel e torniamo indietro
                        // per forzare Leaflet a ridisegnare i layer dei marker
                        map.panBy([1, 1]);
                        map.panBy([-1, -1]);
                    }
                }, 600);
            } catch (e) {
                console.error("Errore inizializzazione:", e);
                document.getElementById('loading-message').innerHTML = "Errore caricamento dati.";
            }
        }
        document.getElementById('close-cluster-btn-map').onclick = () => {
            const menu = document.getElementById('nearbyMenuPlaceholder-map');
            menu.classList.remove('active');
            menu.style.display = 'none';
            document.getElementById('close-cluster-btn-map').style.display = 'none';
        };

        init();
    </script>
</body>

</html>
