<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title id="pageTitle">Mappa - Quadrilatero</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
    <div id="loading-message">
        <p>Caricamento mappa...</p>
    </div>

    <button id="close-cluster-btn-map">Fermer la carte</button>
    <div id="nearbyMenuPlaceholder-map"></div>

    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group" style="cursor: pointer;" onclick="window.location.href='index-fr.html'">
                <button aria-label="Esci dalla mappa" class="menu-toggle" style="pointer-events: none;">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </button>
                <div id="mapNavLink" class="map-link">
                    <svg viewBox="0 0 24 24" class="pin-icon" style="fill: green;">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                    </svg>
                    <span style="color: green; font-weight: bold;">Chiudi mappa</span>
                </div>
            </div>
            <div class="right-header-group">
                <div id="language-switcher"></div>
                <button id="nearby-poi-btn" class="nearby-btn">
                    <svg viewBox="0 0 24 24" class="nearby-icon">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                    </svg>
                </button>
            </div>
        </header>

        <main class="content-body">
            <h1 id="mainTitle">Mappa dei Monumenti</h1>
            <div id="map"></div>
        </main>
    </div>

    <nav class="side-menu" id="sideMenu">
        <div class="menu-content" id="menuContent"></div>
    </nav>

    <div id="nearbyMenuPlaceholder"></div>

    <script>
        const currentLang = 'it';

        window.addEventListener('load', async () => {
            try {
                // 1. Inizializzazione Mappa
                const map = L.map('map').setView([44.4949, 11.3426], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                // 2. Definizione Icona Rossa
                const redPinIcon = L.icon({
                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                });

                // 3. Funzione Clustering
                function clusterPOI(pois, radius) {
                    const clusters = [];
                    const visited = new Set();
                    pois.forEach((p1, i) => {
                        if (visited.has(i)) return;
                        const group = [p1];
                        visited.add(i);
                        pois.forEach((p2, j) => {
                            if (visited.has(j)) return;
                            const dist = Math.sqrt(Math.pow(p1.lat - p2.lat, 2) + Math.pow(p1.lon - p2.lon, 2));
                            if (dist < radius) {
                                group.push(p2);
                                visited.add(j);
                            }
                        });
                        clusters.push(group);
                    });
                    return clusters;
                }

                // 4. Caricamento dati JSON
                const [poisRes, textsRes] = await Promise.all([
                    fetch('pois_config.json'),
                    fetch(`data/translations/${currentLang}/texts.json`)
                ]);

                const poisData = await poisRes.json();
                const textsData = await textsRes.json();

                const allPois = poisData.pois;
                const navTitles = textsData.nav || {};

                // 5. Generazione Cluster e Pin sulla mappa
                const clusters = clusterPOI(allPois, 0.0003);

                clusters.forEach(group => {
                    if (group.length === 1) {
                        const poi = group[0];

                        // --- MODIFICA PRECISA: Usiamo solo lat e lon reali ---
                        const displayLat = poi.lat;
                        const displayLon = poi.lon;

                        L.marker([displayLat, displayLon], { icon: redPinIcon })
                            .addTo(map)
                            .bindTooltip(navTitles[poi.nav_id] || poi.id, {
                                permanent: false,
                                direction: 'top',
                                className: 'map-tooltip'
                            })
                            .on('click', () => {
                                const suffix = currentLang === 'it' ? '-it' : `-${currentLang}`;
                                window.location.href = `${poi.base_name}${suffix}.html`;
                            });
                    } else {
                        // --- MODIFICA PRECISA: Media basata solo su coordinate reali ---
                        const avgLat = group.reduce((sum, p) => sum + p.lat, 0) / group.length;
                        const avgLon = group.reduce((sum, p) => sum + p.lon, 0) / group.length;

                        const clusterIcon = L.divIcon({
                            html: `<div class="cluster-pin"><span>${group.length}</span></div>`,
                            className: '',
                            iconSize: [40, 40],
                            iconAnchor: [20, 20]
                        });

                        const clusterMarker = L.marker([avgLat, avgLon], { icon: clusterIcon }).addTo(map);

                        clusterMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            const closeBtn = document.getElementById('close-cluster-btn-map');

                            if (menu) {
                                menu.innerHTML = '';
                                group.forEach(poi => {
                                    const btn = document.createElement('button');
                                    btn.className = 'cluster-menu-item-map';

                                    const simbolo = getSimboloCategoria(poi.categoria);
                                    const titolo = navTitles[poi.nav_id] || poi.id;

                                    btn.textContent = `${simbolo} ${titolo}`;

                                    btn.onclick = () => {
                                        const suffix = currentLang === 'it' ? '-it' : `-${currentLang}`;
                                        window.location.href = `${poi.base_name}${suffix}.html`;
                                    };
                                    menu.appendChild(btn);
                                });
                                menu.classList.add('active');
                                if (closeBtn) closeBtn.style.display = 'block';
                            }
                        });
                    }
                });
                // Forza il ricalcolo dopo un breve delay per essere sicuri che il CSS sia caricato
                setTimeout(() => {
                    map.invalidateSize();
                    console.log("Mappa ricalcolata");
                }, 500);

                // 6. Gestione chiusura menu mappa
                const closeBtnMap = document.getElementById('close-cluster-btn-map');
                if (closeBtnMap) {
                    closeBtnMap.onclick = function () {
                        const menu = document.getElementById('nearbyMenuPlaceholder-map');
                        if (menu) {
                            menu.classList.remove('active');
                            // Piccola pulizia extra per sicurezza
                        }
                        this.style.display = 'none';
                    };
                }


                // --- LOGICA APERTURA MENU LATERALE (HAMBURGER) ---
                const menuToggle = document.querySelector('.menu-toggle');
                const sideMenu = document.getElementById('sideMenu');

                if (menuToggle && sideMenu) {
                    menuToggle.onclick = function (e) {
                        e.preventDefault();
                        sideMenu.classList.toggle('active');
                    };
                }

                // Chiudi il menu se si clicca fuori (opzionale ma consigliato)
                document.addEventListener('click', (e) => {
                    if (sideMenu && sideMenu.classList.contains('active') &&
                        !sideMenu.contains(e.target) && !menuToggle.contains(e.target)) {
                        sideMenu.classList.remove('active');
                    }
                });

                // Nascondi loader
                const loader = document.getElementById('loading-message');
                if (loader) loader.style.display = 'none';

            } catch (error) {
                console.error("Errore nel caricamento dei dati mappa:", error);
            }
        });
        // Forza l'apertura del menu laterale anche dalla mappa
        document.querySelector('.menu-toggle').addEventListener('click', () => {
            document.getElementById('sideMenu').classList.toggle('active');
        });
    </script>
    <script>
        // --- CONFIGURAZIONE ICONA (Corregge lo spostamento a Nord) ---
        const redIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41], // <--- PUNTA DEL PIN AL CENTRO E IN BASSO
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
        // --- FUNZIONE ICONE (Deve essere presente in tutti i file) ---
        function getSimboloCategoria(categoria) {
            if (!categoria) return '📍 ';
            const cat = categoria.toLowerCase();
            if (cat.includes('edificio') || cat.includes('stabile') || cat.includes('monumento')) return '🏛️ ';
            if (cat.includes('esterno') || cat.includes('aperto') || cat.includes('piazza')) return '🌳 ';
            if (cat.includes('arte') || cat.includes('quadro') || cat.includes('statua')) return '🎨 ';
            return '📍 ';
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // Qui carichi i dati dei POI
                // ESEMPIO DI UTILIZZO NELLA LISTA:
                // const nomeConIcona = getSimboloCategoria(poi.categoria) + poi.titolo;

                // LOGICA PIN ROSSO E HOVER TITOLO (Implementazione 28 Marzo)
                // marker.bindTooltip(poi.titolo); // Se usi Leaflet
                // marker.setTitle(poi.titolo);   // Se usi Google Maps

                const loader = document.getElementById('loading-message');
                if (loader) loader.style.display = 'none';
            } catch (error) {
                console.error("Errore mappa:", error);
            }
        });
    </script>
    <script type="module" src="main.js"></script>
</body>

</html>
