<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Carte - Quadrilatero</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="loading-message"><p>Caricamento mappa...</p></div>
    <button id="close-cluster-btn-map" style="display:none;">Chargement de la carte.</button>
    <div id="nearbyMenuPlaceholder-map"></div>

    <div id="app-wrapper">
        <header class="main-header">
            <div class="left-header-group" style="cursor: pointer;" onclick="window.location.href='index-en.html'">
                <button aria-label="Fermer la carte." class="menu-toggle" style="pointer-events: none;">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </button>
                <div id="mapNavLink" class="map-link">
                    <svg viewBox="0 0 24 24" class="pin-icon" style="fill: green;">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                    </svg>
                    <span style="color: green; font-weight: bold;">Chiudi mappa</span>
                </div>
            </div>
            <div class="right-header-group">
                <div id="language-switcher"></div>
                <button id="nearby-poi-btn" class="nearby-btn">
                    <svg viewBox="0 0 24 24" class="nearby-icon">
                        <path
                            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
                    </svg>
                </button>
            </div>
        </header>
        <main class="content-body">
            <h1 id="mainTitle">Mappa dei Monumenti</h1>
            <div id="map" style="height: 500px;"></div>
        </main>
    </div>

    <nav class="side-menu" id="sideMenu">
        <div class="menu-content" id="menuContent"></div>
    </nav>

    <div id="nearbyMenuPlaceholder"></div>

    <script>
        const currentLang = 'it';

        // 1. Definizione Unica Icona (Correzione offset Nord)
        const redPinIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41], // Punto di partenza standard, modificheremo se necessario
            popupAnchor: [1, -34],
            shadowSize: [41, 41],
            shadowAnchor: [12, 41]
        });

        window.addEventListener('load', async () => {
            try {
                // 2. Inizializzazione Mappa
                const map = L.map('map').setView([44.4949, 11.3426], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                // 3. Caricamento dati
                const [poisRes, textsRes] = await Promise.all([
                    fetch('pois_config.json'),
                    fetch(`data/translations/${currentLang}/texts.json`)
                ]);
                const poisData = await poisRes.json();
                const textsData = await textsRes.json();
                const navTitles = textsData.nav || {};

                // 4. Clustering Semplice
                const clusters = [];
                poisData.pois.forEach(poi => {
                    let cluster = clusters.find(c => c[0].lat === poi.lat && c[0].lon === poi.lon);
                    if (cluster) cluster.push(poi);
                    else clusters.push([poi]);
                });

                // 5. Rendering
                clusters.forEach(group => {
                    if (group.length === 1) {
                        const poi = group[0];
                        
                        // Marker Rosso
                        const marker = L.marker([poi.lat, poi.lon], { icon: redPinIcon }).addTo(map);
                        
                        marker.bindTooltip(navTitles[poi.nav_id] || poi.id, {
                            direction: 'top',
                            offset: [0, -30]
                        });

                        marker.on('click', () => {
                            const suffix = currentLang === 'it' ? '-it' : `-${currentLang}`;
                            window.location.href = `${poi.base_name}${suffix}.html`;
                        });

                        // Cerchietto Blu di Test (Elimina dopo verifica)
                        L.circleMarker([poi.lat, poi.lon], { radius: 3, color: 'blue' }).addTo(map);

                    } else {
                        // Logica Cluster (Cerchio con numero)
                        const clusterIcon = L.divIcon({
                            html: `<div class="cluster-pin"><span>${group.length}</span></div>`,
                            className: 'custom-cluster',
                            iconSize: [40, 40],
                            iconAnchor: [20, 20]
                        });

                        const clusterMarker = L.marker([group[0].lat, group[0].lon], { icon: clusterIcon }).addTo(map);
                        
                        clusterMarker.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            const menu = document.getElementById('nearbyMenuPlaceholder-map');
                            if (menu) {
                                menu.innerHTML = '';
                                group.forEach(p => {
                                    const btn = document.createElement('button');
                                    btn.className = 'cluster-menu-item-map';
                                    btn.textContent = navTitles[p.nav_id] || p.id;
                                    btn.onclick = () => {
                                        const suffix = currentLang === 'it' ? '-it' : `-${currentLang}`;
                                        window.location.href = `${p.base_name}${suffix}.html`;
                                    };
                                    menu.appendChild(btn);
                                });
                                menu.classList.add('active');
                                document.getElementById('close-cluster-btn-map').style.display = 'block';
                            }
                        });
                    }
                });

                document.getElementById('loading-message').style.display = 'none';

            } catch (error) {
                console.error("Errore:", error);
            }
        });

        // Gestione chiusura menu cluster
        document.getElementById('close-cluster-btn-map').onclick = function() {
            document.getElementById('nearbyMenuPlaceholder-map').classList.remove('active');
            this.style.display = 'none';
        };
    </script>
</body>
</html>
